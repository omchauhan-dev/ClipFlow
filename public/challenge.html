<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>20-Day Challenge - Clipflow</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: #1e1e28;
    --fg: #f0f0f5;
    --muted: #8888a0;
    --primary: #9b6bff;
    --primary-glow: #9b6bff15;
    --fuchsia: #d946ef;
    --amber: #f59e0b;
    --rose: #f43f5e;
    --blue: #3b82f6;
    --radius: 16px;
  }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--fg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    -webkit-font-smoothing: antialiased;
  }
  .container {
    max-width: 640px;
    width: 100%;
  }
  .card {
    background: linear-gradient(180deg, var(--surface) 0%, rgba(17,17,24,0.6) 100%);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 48px 40px;
    text-align: center;
    position: relative;
    overflow: hidden;
    backdrop-filter: blur(12px);
  }
  .card::before {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    width: 500px; height: 400px;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    background: var(--primary-glow);
    filter: blur(120px);
    pointer-events: none;
  }
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    border: 1px solid rgba(155,107,255,0.2);
    background: rgba(155,107,255,0.06);
    border-radius: 999px;
    padding: 6px 16px;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 20px;
    position: relative;
  }
  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--primary);
    position: relative;
  }
  .dot::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: var(--primary);
    animation: ping 1.5s ease-in-out infinite;
    opacity: 0.6;
  }
  @keyframes ping {
    0%, 100% { transform: scale(1); opacity: 0.6; }
    50% { transform: scale(2); opacity: 0; }
  }
  h1 {
    font-size: 32px;
    font-weight: 800;
    letter-spacing: -0.03em;
    margin-bottom: 12px;
    position: relative;
  }
  .subtitle {
    color: var(--muted);
    font-size: 15px;
    line-height: 1.5;
    max-width: 400px;
    margin: 0 auto 36px;
    position: relative;
  }
  .flame {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: var(--muted);
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin-bottom: 24px;
    position: relative;
  }
  .flame svg {
    color: var(--primary);
  }
  .timer {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin-bottom: 32px;
    position: relative;
  }
  .timer-group {
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .timer-value {
    font-size: 56px;
    font-weight: 800;
    letter-spacing: -0.02em;
    line-height: 1;
    background: linear-gradient(180deg, #fff 40%, rgba(255,255,255,0.5));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    font-variant-numeric: tabular-nums;
  }
  .timer-label {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-top: 6px;
  }
  .timer-sep {
    font-size: 36px;
    font-weight: 200;
    color: rgba(136,136,160,0.2);
    margin-bottom: 20px;
  }
  .progress-wrap {
    max-width: 400px;
    margin: 0 auto;
    position: relative;
  }
  .progress-track {
    height: 6px;
    border-radius: 99px;
    background: rgba(30,30,40,0.6);
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    border-radius: 99px;
    background: linear-gradient(90deg, var(--primary), var(--fuchsia));
    transition: width 1s linear;
  }
  .progress-labels {
    display: flex;
    justify-content: space-between;
    margin-top: 6px;
    font-size: 11px;
    color: var(--muted);
  }
  .stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-top: 24px;
    position: relative;
  }
  .stat {
    background: rgba(17,17,24,0.5);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 8px;
  }
  .stat-icon {
    width: 20px; height: 20px;
    margin: 0 auto 8px;
  }
  .stat-primary { color: var(--primary); }
  .stat-blue { color: var(--blue); }
  .stat-amber { color: var(--amber); }
  .stat-rose { color: var(--rose); }
  .stat-value {
    font-size: 22px;
    font-weight: 700;
    line-height: 1;
  }
  .stat-label {
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
  }
  .milestones {
    background: rgba(17,17,24,0.3);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px 24px;
    margin-top: 16px;
    position: relative;
  }
  .milestones-title {
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 14px;
    color: var(--muted);
  }
  .milestone {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 0;
  }
  .milestone + .milestone {
    border-top: 1px solid var(--border);
  }
  .milestone-icon {
    width: 32px; height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 15px;
  }
  .milestone-icon.reached {
    background: rgba(155,107,255,0.15);
    color: var(--primary);
  }
  .milestone-icon.pending {
    background: rgba(30,30,40,0.5);
    color: rgba(136,136,160,0.4);
  }
  .milestone-label {
    flex: 1;
    font-size: 14px;
    min-width: 0;
  }
  .milestone-label.reached { color: var(--fg); }
  .milestone-label.pending { color: rgba(136,136,160,0.5); }
  .milestone-day {
    font-size: 12px;
    flex-shrink: 0;
  }
  .milestone-day.reached { color: var(--primary); }
  .milestone-day.pending { color: rgba(136,136,160,0.3); }
  .reset-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-top: 20px;
    padding: 8px 18px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: transparent;
    color: var(--muted);
    font-size: 12px;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }
  .reset-btn:hover {
    border-color: var(--primary);
    color: var(--primary);
    background: rgba(155,107,255,0.08);
  }
  @media (max-width: 520px) {
    .card { padding: 32px 20px; }
    .timer-value { font-size: 40px; }
    .timer { gap: 10px; }
    .timer-sep { font-size: 28px; }
    .stats { grid-template-columns: repeat(2, 1fr); }
    h1 { font-size: 26px; }
  }
</style>
</head>
<body>

<div class="container">
  <div class="card">
    <div class="badge">
      <span class="dot"></span>
      20-day challenge
    </div>

    <h1 id="title">Making Clipflow Profitable</h1>
    <p class="subtitle" id="subtitle">20 days to turn Clipflow into a sustainable business. Every second counts.</p>

    <div class="flame" id="flame-row">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg>
      Time Remaining
    </div>

    <div class="timer" id="timer">
      <div class="timer-group">
        <span class="timer-value" id="days">00</span>
        <span class="timer-label">Days</span>
      </div>
      <span class="timer-sep">:</span>
      <div class="timer-group">
        <span class="timer-value" id="hours">00</span>
        <span class="timer-label">Hours</span>
      </div>
      <span class="timer-sep">:</span>
      <div class="timer-group">
        <span class="timer-value" id="minutes">00</span>
        <span class="timer-label">Min</span>
      </div>
      <span class="timer-sep">:</span>
      <div class="timer-group">
        <span class="timer-value" id="seconds">00</span>
        <span class="timer-label">Sec</span>
      </div>
    </div>

    <div class="progress-wrap">
      <div class="progress-track">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
      </div>
      <div class="progress-labels">
        <span>Day 1</span>
        <span>Day 20</span>
      </div>
    </div>

    <div class="stats">
      <div class="stat">
        <svg class="stat-icon stat-primary" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"/><path d="m12 15-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"/><path d="M9 12H4s.55-3.03 2-4"/><path d="M15 9h6s-.55-3.03-2-4"/></svg>
        <div class="stat-value" id="statDays">20</div>
        <div class="stat-label">Total Days</div>
      </div>
      <div class="stat">
        <svg class="stat-icon stat-blue" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        <div class="stat-value" id="statDay">0</div>
        <div class="stat-label">Day</div>
      </div>
      <div class="stat">
        <svg class="stat-icon stat-amber" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>
        <div class="stat-value" id="statProgress">0%</div>
        <div class="stat-label">Progress</div>
      </div>
      <div class="stat">
        <svg class="stat-icon stat-rose" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg>
        <div class="stat-value" id="statStatus">In Progress</div>
        <div class="stat-label">Status</div>
      </div>
    </div>

    <div class="milestones">
      <div class="milestones-title">Milestones</div>
      <div id="milestonesList"></div>
    </div>

    <button class="reset-btn" id="resetBtn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
      Reset timer
    </button>
  </div>
</div>

<script>
const STORAGE_KEY = 'clipflow-challenge-start';
const TOTAL_DAYS = 20;

const milestones = [
  { day: 5, label: 'First paying users' },
  { day: 10, label: '100+ active users' },
  { day: 15, label: 'Revenue > costs' },
  { day: 20, label: 'Profitable!' },
];

function getStart() {
  const stored = localStorage.getItem(STORAGE_KEY);
  if (stored) return new Date(stored);
  const now = new Date();
  localStorage.setItem(STORAGE_KEY, now.toISOString());
  return now;
}

function calc(end) {
  const diff = end.getTime() - Date.now();
  if (diff <= 0) return { days: 0, hours: 0, minutes: 0, seconds: 0, total: 0 };
  return {
    days: Math.floor(diff / 86400000),
    hours: Math.floor((diff / 3600000) % 24),
    minutes: Math.floor((diff / 60000) % 60),
    seconds: Math.floor((diff / 1000) % 60),
    total: diff,
  };
}

function pad(n) { return String(n).padStart(2, '0'); }

function tick() {
  const start = getStart();
  const end = new Date(start.getTime() + TOTAL_DAYS * 86400000);
  const tl = calc(end);
  const expired = tl.total <= 0;
  const elapsedSec = TOTAL_DAYS * 86400 - tl.total / 1000;
  const progress = Math.min(elapsedSec / (TOTAL_DAYS * 86400), 1);
  const dayNum = expired ? TOTAL_DAYS : Math.floor(elapsedSec / 86400) + 1;

  document.getElementById('days').textContent = pad(tl.days);
  document.getElementById('hours').textContent = pad(tl.hours);
  document.getElementById('minutes').textContent = pad(tl.minutes);
  document.getElementById('seconds').textContent = pad(tl.seconds);
  document.getElementById('progressFill').style.width = `${progress * 100}%`;
  document.getElementById('statDays').textContent = TOTAL_DAYS;
  document.getElementById('statDay').textContent = `${dayNum}/${TOTAL_DAYS}`;
  document.getElementById('statProgress').textContent = `${Math.round(progress * 100)}%`;
  document.getElementById('statStatus').textContent = expired ? 'Complete' : 'In Progress';
  document.getElementById('statStatus').style.color = expired ? 'var(--primary)' : 'var(--rose)';

  if (expired) {
    document.getElementById('title').textContent = 'Challenge Complete!';
    document.getElementById('subtitle').textContent = 'The 20 days are up. Time to assess the results.';
    document.getElementById('flame-row').innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg> Challenge Finished`;
  }

  const msList = document.getElementById('milestonesList');
  msList.innerHTML = milestones.map(m => {
    const reached = dayNum >= m.day || expired;
    return `<div class="milestone">
      <div class="milestone-icon ${reached ? 'reached' : 'pending'}">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">${reached ? '<polyline points="20 6 9 17 4 12"/>' : '<circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/>'}</svg>
      </div>
      <span class="milestone-label ${reached ? 'reached' : 'pending'}">${m.label}</span>
      <span class="milestone-day ${reached ? 'reached' : 'pending'}">Day ${m.day}</span>
    </div>`;
  }).join('');
}

document.getElementById('resetBtn').addEventListener('click', () => {
  if (confirm('Reset the 20-day challenge? This will restart the timer from today.')) {
    localStorage.removeItem(STORAGE_KEY);
    tick();
  }
});

tick();
setInterval(tick, 1000);
</script>
</body>
</html>
